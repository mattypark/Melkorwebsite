<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request a Demo — Melkor</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .demo {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 90px 22px 60px;
      z-index: 10;
      overflow: auto;
    }
    .demo__inner {
      max-width: 520px;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--pill-br);
      border-radius: 18px;
      padding: 36px 36px 32px;
      backdrop-filter: blur(14px) saturate(150%);
      -webkit-backdrop-filter: blur(14px) saturate(150%);
      box-shadow: 0 14px 48px -10px rgba(0,0,0,0.18);
    }
    .demo__inner h1 {
      font-size: 24px;
      letter-spacing: -0.02em;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .demo__inner p.lead {
      color: var(--muted);
      margin-bottom: 22px;
    }
    .demo__back {
      position: fixed;
      top: 18px;
      left: 22px;
      z-index: 20;
      font-family: var(--font-sans);
      font-size: 22px;
      letter-spacing: -0.025em;
      font-weight: 500;
    }
    .demo__back:hover { opacity: 0.7; }
  </style>
</head>
<body>

  <canvas id="bg-canvas" class="bg-canvas" aria-hidden="true"></canvas>

  <a class="demo__back" href="/">Melkor</a>

  <main class="demo">
    <div class="demo__inner">
      <h1>Request a Demo</h1>
      <p class="lead">Leave your details. We'll send a calendar link.</p>
      <form class="demo-form" id="demo-form" novalidate>
        <label>Name
          <input type="text" name="name" required />
        </label>
        <label>Email
          <input type="email" name="email" required />
        </label>
        <label>Company
          <input type="text" name="company" />
        </label>
        <label>What do you want to see?
          <textarea name="message" rows="3"></textarea>
        </label>
        <div class="demo-form__row">
          <button class="demo-form__submit" type="submit">Send</button>
          <span class="demo-form__msg" id="demo-msg"></span>
        </div>
      </form>
    </div>
  </main>

  <script>
    // shared bg canvas of 1s/0s, same as home + philosophy
    (function () {
      const c = document.getElementById("bg-canvas");
      const ctx = c.getContext("2d");
      const CELL = 22, FONT_PX = 11;
      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      let cols = 0, rows = 0, cells = [];

      function rs() {
        c.width  = innerWidth  * DPR;
        c.height = innerHeight * DPR;
        c.style.width  = innerWidth  + "px";
        c.style.height = innerHeight + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        cols = Math.ceil(innerWidth  / CELL) + 1;
        rows = Math.ceil(innerHeight / CELL) + 1;
        cells = new Array(cols * rows);
        for (let i = 0; i < cells.length; i++) {
          cells[i] = { v: Math.random() < 0.5 ? "0" : "1", p: Math.random() * Math.PI * 2 };
        }
      }
      rs();
      addEventListener("resize", rs);

      function f(t) {
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        ctx.font = FONT_PX + 'px ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace';
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const time = t * 0.0008;
        for (let r = 0; r < rows; r++) {
          const y = r * CELL + CELL / 2;
          for (let col = 0; col < cols; col++) {
            const cell = cells[r * cols + col];
            if (Math.random() < 0.0015) cell.v = cell.v === "0" ? "1" : "0";
            const a = 0.18 + Math.sin(time + cell.p) * 0.10;
            ctx.fillStyle = "rgba(45, 92, 220, " + a.toFixed(3) + ")";
            ctx.fillText(cell.v, col * CELL + CELL / 2, y);
          }
        }
        requestAnimationFrame(f);
      }
      requestAnimationFrame(f);
    })();

    // form: stub submit handler
    document.getElementById("demo-form").addEventListener("submit", (e) => {
      e.preventDefault();
      document.getElementById("demo-msg").textContent = "Sent. We'll be in touch.";
      e.target.reset();
    });
  </script>
</body>
</html>
