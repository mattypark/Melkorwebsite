<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Philosophy — Melkor</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Philosophy page: same bg canvas of 1s/0s as the home page sits
       behind the content. The text in the middle starts as a wall of 1s
       and 0s and decodes itself into the philosophy paragraphs — each
       character scrambles between 0/1 for a moment, then locks. */
    .phil {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 90px 22px 60px;
      z-index: 10;
      overflow: auto;
    }
    .phil__inner {
      max-width: 720px;
      width: 100%;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.75;
      color: var(--fg);
      white-space: pre-wrap;
    }
    .phil__char.scramble { color: var(--accent); opacity: 0.85; }
    .phil__char.locked   { color: var(--fg); }
    .phil__back {
      position: fixed;
      top: 18px;
      left: 22px;
      z-index: 20;
      font-family: var(--font-sans);
      font-size: 22px;
      letter-spacing: -0.025em;
      font-weight: 500;
    }
    .phil__back:hover { opacity: 0.7; }
  </style>
</head>
<body>

  <canvas id="bg-canvas" class="bg-canvas" aria-hidden="true"></canvas>

  <a class="phil__back" href="/">Melkor</a>

  <main class="phil">
    <div class="phil__inner" id="phil-text" aria-live="polite"></div>
  </main>

  <script>
    // --- shared bg: same 1s/0s canvas as home --------------------------
    (function () {
      const c = document.getElementById("bg-canvas");
      const ctx = c.getContext("2d");
      const CELL = 22, FONT_PX = 11;
      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      let cols = 0, rows = 0, cells = [];

      function rs() {
        c.width  = innerWidth  * DPR;
        c.height = innerHeight * DPR;
        c.style.width  = innerWidth  + "px";
        c.style.height = innerHeight + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        cols = Math.ceil(innerWidth  / CELL) + 1;
        rows = Math.ceil(innerHeight / CELL) + 1;
        cells = new Array(cols * rows);
        for (let i = 0; i < cells.length; i++) {
          cells[i] = { v: Math.random() < 0.5 ? "0" : "1", p: Math.random() * Math.PI * 2 };
        }
      }
      rs();
      addEventListener("resize", rs);

      function f(t) {
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        ctx.font = FONT_PX + 'px ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace';
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const time = t * 0.0008;
        for (let r = 0; r < rows; r++) {
          const y = r * CELL + CELL / 2;
          for (let col = 0; col < cols; col++) {
            const cell = cells[r * cols + col];
            if (Math.random() < 0.0015) cell.v = cell.v === "0" ? "1" : "0";
            const a = 0.18 + Math.sin(time + cell.p) * 0.10;
            ctx.fillStyle = "rgba(45, 92, 220, " + a.toFixed(3) + ")";
            ctx.fillText(cell.v, col * CELL + CELL / 2, y);
          }
        }
        requestAnimationFrame(f);
      }
      requestAnimationFrame(f);
    })();

    // --- text decode: 1s/0s -> philosophy --------------------------------
    // Each non-whitespace character of the target string starts scrambling
    // (showing random 0/1) and locks to its real character after its own
    // delay. The delay rises monotonically with position so the text
    // reveals left-to-right, top-to-bottom.
    (function () {
      const PHILOSOPHY = [
        "We don't build to occupy meetings.",
        "We don't ship to fill quarters.",
        "We don't talk about the future as if",
        "it's something other people will arrive at.",
        "",
        "The gap between what is possible and what",
        "exists is a moral problem. Closing it is",
        "the only work worth doing carefully.",
        "",
        "If a thing doesn't move someone, it isn't done.",
        "If a thing isn't honest, we don't ship it.",
        "If a thing isn't ours, we don't pretend it is.",
        "",
        "That is the whole document."
      ].join("\n");

      const root = document.getElementById("phil-text");

      // Build the DOM: one span per character so each char can scramble
      // independently.
      const chars = [];
      for (let i = 0; i < PHILOSOPHY.length; i++) {
        const ch = PHILOSOPHY[i];
        if (ch === "\n") {
          root.appendChild(document.createTextNode("\n"));
          continue;
        }
        const span = document.createElement("span");
        span.className = "phil__char scramble";
        span.textContent = ch === " " ? " " : (Math.random() < 0.5 ? "0" : "1");
        span.dataset.target = ch;
        root.appendChild(span);
        chars.push(span);
      }

      const start    = performance.now() + 250;   // small breath before reveal
      const perChar  = 28;                         // ms between each lock
      const scrambleDur = 600;                     // ms each char scrambles
      let locked = 0;

      function tick(now) {
        // for each not-yet-locked char, either scramble or lock.
        for (let i = locked; i < chars.length; i++) {
          const span = chars[i];
          const t = now - (start + i * perChar);
          if (t < 0) break;          // not started yet
          if (span.dataset.target === " ") {
            span.textContent = " ";
            span.classList.remove("scramble");
            span.classList.add("locked");
            if (i === locked) locked++;
            continue;
          }
          if (t < scrambleDur) {
            span.textContent = Math.random() < 0.5 ? "0" : "1";
          } else {
            span.textContent = span.dataset.target;
            span.classList.remove("scramble");
            span.classList.add("locked");
            if (i === locked) locked++;
          }
        }
        if (locked < chars.length) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
