<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Melkor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background: blue dots on white, warped continuously by SVG turbulence,
       plus three soft glass lenses that follow the cursor at different lag
       rates for a watery, layered feel. Whole thing is decorative. -->
  <div class="bg" aria-hidden="true">
    <div class="bg__dots"></div>
    <div class="bg__dots bg__dots--warp"></div>
    <div class="lens lens--1"></div>
    <div class="lens lens--2"></div>
    <div class="lens lens--3"></div>

    <!-- Liquid-glass orb. Tracks the cursor with light damping so the
         center sits under the pointer but the orb still feels heavy.
         Glass material = backdrop-filter (blur + saturate) for refraction
         of the dots underneath, plus inset highlight/shadow + outer drop
         shadow to read as a real lifted glass disc. -->
    <div class="glass glass--a"></div>
  </div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- The dot grid is warped by turbulence noise. baseFrequency animates
           slowly so the warp drifts on its own; displacement scale also
           animates so the warp "breathes." script.js can drive `scale`
           higher when the cursor is moving fast for a watery push. -->
      <filter id="liquid" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.009 0.012" numOctaves="2" seed="4" result="noise">
          <animate attributeName="baseFrequency" dur="26s"
                   values="0.008 0.011; 0.014 0.017; 0.008 0.011" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap id="liquidDisp" in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <!-- top-left: wordmark -->
  <header class="tl">
    <a class="wordmark" href="/">Melkor</a>
  </header>

  <!-- left column: menu + contact key hint -->
  <aside class="left">
    <nav class="menu" aria-label="main">
      <ul>
        <li><button class="menu__item" data-panel="products"   type="button">Products</button></li>
        <li><button class="menu__item" data-panel="enterprise" type="button">Enterprise</button></li>
        <li><button class="menu__item" data-panel="philosophy" type="button">Philosophy</button></li>
        <li><button class="menu__item" data-panel="demo"       type="button">Request a Demo</button></li>
      </ul>
    </nav>
    <button class="contact" type="button">
      <span>Contact</span>
      <kbd>C</kbd>
    </button>
  </aside>

  <!-- popup: small box near the menu. Content swaps based on which menu
       item was clicked. The backdrop is transparent (no dim) but catches
       outside clicks so the popup feels lightweight, not modal. -->
  <div class="panel-backdrop" id="panel-backdrop" hidden></div>
  <aside class="panel" id="panel" role="dialog" aria-modal="false" aria-labelledby="panel-title" hidden>
    <div class="panel__inner">
      <div class="panel__tab" id="panel-title">Philosophy</div>
      <button class="panel__close" id="panel-close" type="button" aria-label="close">&times;</button>
      <div class="panel__body" id="panel-body">
        <!-- content injected by script.js based on data-panel -->
      </div>
    </div>
  </aside>

  <!-- bottom-right: links stack -->
  <nav class="br" aria-label="external links">
    <a href="#">LinkedIn</a>
    <a href="#">Instagram</a>
    <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
  </nav>

  <!-- center placeholder where the original has its sculpture.
       Drop in your own thing later: shader, image, mesh, anything.
       Left empty on purpose. -->
  <main class="stage" aria-hidden="true"></main>

  <script src="script.js" defer></script>
</body>
</html>
